id: example_bullish_swing
priority: 100
enabled: true
description: >
  Reference rule shipped with the repo so the loader has something to
  parse and the E2E paper test (RULE-04) has a deterministic match.
  Real strategies live in tickets RULE-* in later milestones.

conditions:
  - field: intent
    op: eq
    value: bullish
  - field: confidence
    op: gte
    value: 0.6
  - field: time_horizon
    op: in
    value: [intraday, swing]

action:
  trading_mode: paper
  side: buy
  order_type: market
  quantity: 1
  reference_price_usd: 100.0
  strategy_id: example_bullish_swing
