# Five independent processes per CLAUDE.md §3.2.
# NOTE: workers are stubs until their phase lands — see BACKLOG.md.

x-backend: &backend
  build:
    context: .
    dockerfile: Dockerfile.backend
  env_file: .env

services:
  api:
    <<: *backend
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy

  ingestion:
    <<: *backend
    command: python -m backend.workers.ingestion_stub
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy

  llm_worker:
    <<: *backend
    command: python -m backend.workers.llm_stub
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy

  executor:
    <<: *backend
    command: python -m backend.workers.executor_stub
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy

  telegram_bot:
    <<: *backend
    command: python -m backend.workers.telegram_stub
    volumes:
      - ./logs:/app/logs

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
